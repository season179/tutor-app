<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Tutor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div>
          <p class="eyebrow">Voice tutoring room</p>
          <h1>AI Tutor</h1>
          <p class="lede">
            Talk through homework, upload a problem image, and get short
            step-by-step help from a voice tutor.
          </p>
        </div>

        <div class="controls">
          <button id="start" type="button">Start tutoring</button>
          <button id="stop" type="button" disabled>End session</button>
        </div>

        <form class="image-form" id="image-form">
          <div class="image-grid">
            <label class="field">
              <span>Problem image</span>
              <input id="image-input" type="file" accept="image/*" />
            </label>

            <div class="image-preview-block">
              <div class="image-preview">
                <img id="image-preview" alt="" hidden />
                <p id="image-empty">No problem image yet.</p>
              </div>
              <p class="image-meta" id="image-meta">No problem image yet.</p>
            </div>
          </div>

          <label class="field">
            <span>Question</span>
            <textarea id="image-prompt" rows="2">Help me understand this problem step by step.</textarea>
          </label>

          <button id="send-image" type="submit" disabled>Ask about image</button>
        </form>

        <p class="status" id="status">Ready when you are.</p>
        <audio id="remote-audio" autoplay></audio>
      </section>

      <section class="events">
        <h2>Session log</h2>
        <pre id="event-log" aria-live="polite">No session events yet.</pre>
      </section>
    </main>

    <script type="module" src="/client.js"></script>
  </body>
</html>
