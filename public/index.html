<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GPT Realtime Voice Test</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div>
          <p class="eyebrow">OpenAI Realtime API</p>
          <h1>GPT Realtime Voice Test</h1>
          <p class="lede">
            Start a WebRTC session, allow microphone access, and speak to the
            <code>gpt-realtime-2</code> model.
          </p>
        </div>

        <div class="controls">
          <button id="start" type="button">Start voice session</button>
          <button id="stop" type="button" disabled>Stop</button>
        </div>

        <form class="image-form" id="image-form">
          <div class="image-grid">
            <label class="field">
              <span>Image</span>
              <input id="image-input" type="file" accept="image/*" />
            </label>

            <div class="image-preview-block">
              <div class="image-preview">
                <img id="image-preview" alt="" hidden />
                <p id="image-empty">No image selected.</p>
              </div>
              <p class="image-meta" id="image-meta">No image selected.</p>
            </div>
          </div>

          <label class="field">
            <span>Prompt</span>
            <textarea id="image-prompt" rows="2">What should I notice in this image?</textarea>
          </label>

          <button id="send-image" type="submit" disabled>Send image</button>
        </form>

        <p class="status" id="status">Disconnected.</p>
        <audio id="remote-audio" autoplay></audio>
      </section>

      <section class="events">
        <h2>Realtime events</h2>
        <pre id="event-log" aria-live="polite">No events yet.</pre>
      </section>
    </main>

    <script type="module" src="/client.js"></script>
  </body>
</html>
